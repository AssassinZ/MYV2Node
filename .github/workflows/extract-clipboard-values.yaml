name: 定时提取网页clipboard值并保存

on:
  schedule:
    # 北京时间每天8点执行（UTC 0点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

jobs:
  extract-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      # 关键：确保检出仓库代码（必须有这一步，否则找不到脚本/requirements.txt）
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 仅检出最新提交，加速

      # 设置Python环境，现在能找到requirements.txt，缓存正常
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 现在有requirements.txt，缓存生效
          cache-dependency-path: 'requirements.txt'  # 指定依赖文件路径

      # 安装依赖（从requirements.txt安装，更规范）
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 执行提取脚本（确认脚本路径正确）
      - name: 运行提取脚本
        run: |
          # 先检查脚本是否存在，避免找不到文件
          ls -l  # 列出目录文件，方便调试
          python extract_values.py

      # 上传结果文件
      - name: 上传结果文件
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-values-result
          path: only_results.txt
          retention-days: 90

      # 提交结果到仓库
      - name: 提交结果文件到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add only_results.txt
          # 仅文件变化时提交
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新clipboard提取结果 $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}