# 工作流名称
name: 定时提取网页clipboard值并保存

# 触发规则：1. 每天UTC时间0点执行（对应北京时间8点）；2. 手动触发（方便测试）；3. 推送代码时触发（测试）
on:
  schedule:
    # Cron 表达式（UTC时间）：分 时 日 月 周，这里是每天0点0分执行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]  # 推送main分支时触发（测试用，可删除）

# 执行的任务
jobs:
  extract-values:
    # 运行环境：最新版Ubuntu
    runs-on: ubuntu-latest
    # 设置权限（允许提交文件到仓库）
    permissions:
      contents: write  # 写仓库内容的权限
      actions: read

    steps:
      # 步骤1：检出仓库代码（让Action能访问到你的Python脚本）
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（匹配脚本运行的Python版本）
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐3.8+，可根据需要调整
          cache: 'pip'  # 缓存pip依赖，加速下次运行

      # 步骤3：安装Python依赖（requests、BeautifulSoup）
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 步骤4：执行提取脚本（生成TXT文件）
      - name: 运行提取脚本
        run: python extract_values.py

      # 步骤5：上传TXT文件为Artifact（方便查看结果，保留90天）
      - name: 上传结果文件
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-values-result  # 产物名称
          path: only_results.txt  # 你的TXT文件路径（和脚本中一致）
          retention-days: 90  # 文件保留天数

      # 步骤6：（可选）将TXT文件提交回GitHub仓库（持久化保存）
      - name: 提交结果文件到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add only_results.txt
          # 仅当文件有变化时提交，避免空提交
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新clipboard提取结果 $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动生成的Token，无需手动配置